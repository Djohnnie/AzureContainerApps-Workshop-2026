services:
  api:
    build:
      context: ./AzureContainerApps.Exercise203.Api
      dockerfile: Dockerfile
    image: azure-container-apps-exercise-203-api:latest
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./AzureContainerApps.Exercise203.Worker
      dockerfile: Dockerfile
    image: azure-container-apps-exercise-203-worker:latest
    environment:
      - API_BASE_URL=http://api:8080
    depends_on:
      api:
        condition: service_healthy
