<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Exercise 102: Your first web app in a Container</title>
  <desc id="desc">Exercise 102 slide for creating a first ASP.NET web application running inside a container with Visual Studio and Docker.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081b33"/>
      <stop offset="55%" stop-color="#0f3d78"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#021124" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1580" cy="160" r="250" fill="#60a5fa" fill-opacity="0.14"/>
  <circle cx="1710" cy="910" r="330" fill="#38bdf8" fill-opacity="0.10"/>
  <circle cx="320" cy="920" r="220" fill="#5eead4" fill-opacity="0.08"/>
  <rect x="140" y="120" width="160" height="10" rx="5" fill="url(#accent)"/>

  <text x="140" y="250" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="1">
    Exercise 102: Your first web app in a Container
  </text>

  <text x="140" y="390" fill="#99f6e4" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="5">
    HANDS-ON EXERCISE
  </text>

  <g filter="url(#shadow)">
    <rect x="140" y="455" width="980" height="305" rx="34" fill="#0b1f3f" fill-opacity="0.56" stroke="url(#panelStroke)" stroke-width="2"/>
  </g>

  <g transform="translate(190 520)" font-family="Segoe UI, Arial, sans-serif">
    <circle cx="0" cy="18" r="12" fill="#5eead4"/>
    <text x="40" y="30" fill="#ffffff" font-size="44" font-weight="600">
      Use Visual Studio and Docker to create your
    </text>
    <text x="40" y="95" fill="#ffffff" font-size="44" font-weight="600">
      first ASP.NET web application running
    </text>
    <text x="40" y="160" fill="#ffffff" font-size="44" font-weight="600">
      inside a container
    </text>
  </g>

  <g transform="translate(1320 310)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="420" height="420" rx="34" fill="#0b1f3f" fill-opacity="0.6" stroke="url(#panelStroke)" stroke-width="2"/>
    </g>
    <rect x="55" y="60" width="310" height="220" rx="14" fill="#0f3d78" stroke="#93c5fd" stroke-width="3"/>
    <rect x="55" y="60" width="310" height="42" rx="14" fill="#1d4ed8"/>
    <rect x="55" y="88" width="310" height="14" fill="#1d4ed8"/>
    <circle cx="87" cy="81" r="8" fill="#ef4444" fill-opacity="0.8"/>
    <circle cx="114" cy="81" r="8" fill="#f59e0b" fill-opacity="0.8"/>
    <circle cx="141" cy="81" r="8" fill="#22c55e" fill-opacity="0.8"/>
    <rect x="175" y="69" width="160" height="24" rx="6" fill="#0b1f3f" fill-opacity="0.7" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="255" y="87" text-anchor="middle" fill="#93c5fd" font-family="Consolas, 'Courier New', monospace" font-size="14">localhost:8080</text>
    <text x="210" y="175" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">.NET</text>
    <text x="210" y="225" text-anchor="middle" fill="#99f6e4" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">ASP.NET Web App</text>
    <rect x="95" y="310" width="230" height="70" rx="18" fill="#1d4ed8" stroke="#93c5fd" stroke-width="3"/>
    <text x="210" y="353" text-anchor="middle" fill="#ffffff" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700">docker run</text>
  </g>

  <rect x="140" y="885" width="620" height="4" rx="2" fill="#dbeafe" fill-opacity="0.5"/>
</svg>
