<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Azure Containers - service overview slide</title>
  <desc id="desc">Overview of Azure container services: Web App, Function App, Container Instance, Container App, AKS.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081b33"/>
      <stop offset="55%" stop-color="#0f3d78"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="120" r="280" fill="#60a5fa" fill-opacity="0.10"/>
  <circle cx="1800" cy="960" r="300" fill="#38bdf8" fill-opacity="0.08"/>
  <circle cx="160"  cy="940" r="200" fill="#5eead4"  fill-opacity="0.07"/>
  <rect x="140" y="120" width="160" height="10" rx="5" fill="url(#accent)"/>

  <text x="140" y="228" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="1">Azure Containers</text>

  <g font-family="Segoe UI, Arial, sans-serif">

    <!-- ── Card 1: Web App ── x=80 -->
    <g transform="translate(80,268)">
      <rect x="0" y="0" width="320" height="650" rx="22" fill="#0b1f3f" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="228" rx="22" fill="#1d4ed8"/>
      <rect x="0" y="205" width="320" height="23" fill="#1d4ed8"/>
      <!-- Globe icon -->
      <g transform="translate(160,114)">
        <circle r="46" fill="none" stroke="white" stroke-width="3.5"/>
        <ellipse rx="22" ry="46" fill="none" stroke="white" stroke-width="2.5"/>
        <line x1="-46" y1="0" x2="46" y2="0" stroke="white" stroke-width="2.5"/>
        <path d="M -43 -20 Q 0 -29 43 -20" fill="none" stroke="white" stroke-width="2"/>
        <path d="M -43  20 Q 0  29 43  20" fill="none" stroke="white" stroke-width="2"/>
      </g>
      <text x="160" y="280" text-anchor="middle" fill="white" font-size="40" font-weight="700">Web App</text>
      <text x="160" y="328" text-anchor="middle" fill="#99f6e4" font-size="26" font-weight="500">App Service</text>
    </g>

    <!-- ── Card 2: Function App ── x=440 -->
    <g transform="translate(440,268)">
      <rect x="0" y="0" width="320" height="650" rx="22" fill="#0b1f3f" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="228" rx="22" fill="#7c3aed"/>
      <rect x="0" y="205" width="320" height="23" fill="#7c3aed"/>
      <!-- Lightning bolt icon -->
      <g transform="translate(160,114)">
        <path d="M 11 -47 L -17 6 L 1 6 L -13 47 L 23 -7 L 5 -7 Z" fill="white"/>
      </g>
      <text x="160" y="280" text-anchor="middle" fill="white" font-size="38" font-weight="700">Function App</text>
      <text x="160" y="328" text-anchor="middle" fill="#99f6e4" font-size="26" font-weight="500">Serverless</text>
    </g>

    <!-- ── Card 3: Container Instance ── x=800 -->
    <g transform="translate(800,268)">
      <rect x="0" y="0" width="320" height="650" rx="22" fill="#0b1f3f" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="228" rx="22" fill="#0891b2"/>
      <rect x="0" y="205" width="320" height="23" fill="#0891b2"/>
      <!-- Single container box icon -->
      <g transform="translate(160,114)">
        <rect x="-46" y="-36" width="92" height="72" rx="8" fill="white" fill-opacity="0.12" stroke="white" stroke-width="3.5"/>
        <line x1="-46" y1="-8"  x2="46" y2="-8"  stroke="white" stroke-width="2.5"/>
        <line x1="-15" y1="-36" x2="-15" y2="36" stroke="white" stroke-width="2" stroke-opacity="0.65"/>
        <line x1=" 15" y1="-36" x2=" 15" y2="36" stroke="white" stroke-width="2" stroke-opacity="0.65"/>
      </g>
      <text x="160" y="268" text-anchor="middle" fill="white" font-size="34" font-weight="700">Container</text>
      <text x="160" y="308" text-anchor="middle" fill="white" font-size="34" font-weight="700">Instance</text>
      <text x="160" y="356" text-anchor="middle" fill="#99f6e4" font-size="26" font-weight="500">On-demand</text>
    </g>

    <!-- ── Card 4: Container App ── x=1160 -->
    <g transform="translate(1160,268)">
      <rect x="0" y="0" width="320" height="650" rx="22" fill="#0b1f3f" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="228" rx="22" fill="#059669"/>
      <rect x="0" y="205" width="320" height="23" fill="#059669"/>
      <!-- 2x2 container grid icon -->
      <g transform="translate(160,114)">
        <rect x="-48" y="-48" width="42" height="42" rx="7" fill="white" fill-opacity="0.18" stroke="white" stroke-width="3"/>
        <rect x="  6" y="-48" width="42" height="42" rx="7" fill="white" fill-opacity="0.18" stroke="white" stroke-width="3"/>
        <rect x="-48" y="  6" width="42" height="42" rx="7" fill="white" fill-opacity="0.18" stroke="white" stroke-width="3"/>
        <rect x="  6" y="  6" width="42" height="42" rx="7" fill="white" fill-opacity="0.18" stroke="white" stroke-width="3"/>
      </g>
      <text x="160" y="268" text-anchor="middle" fill="white" font-size="34" font-weight="700">Container</text>
      <text x="160" y="308" text-anchor="middle" fill="white" font-size="34" font-weight="700">App</text>
      <text x="160" y="356" text-anchor="middle" fill="#99f6e4" font-size="26" font-weight="500">Managed Platform</text>
    </g>

    <!-- ── Card 5: AKS ── x=1520 -->
    <g transform="translate(1520,268)">
      <rect x="0" y="0" width="320" height="650" rx="22" fill="#0b1f3f" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.5"/>
      <rect x="0" y="0" width="320" height="228" rx="22" fill="#4338ca"/>
      <rect x="0" y="205" width="320" height="23" fill="#4338ca"/>
      <!-- Kubernetes helm wheel (7 spokes) -->
      <g transform="translate(160,114)">
        <circle r="48" fill="none" stroke="white" stroke-width="3.5"/>
        <circle r="13" fill="white"/>
        <line x1="0"    y1="-13" x2="0"    y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
        <g transform="rotate(51.4)"> <line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
        <g transform="rotate(102.9)"><line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
        <g transform="rotate(154.3)"><line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
        <g transform="rotate(205.7)"><line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
        <g transform="rotate(257.1)"><line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
        <g transform="rotate(308.6)"><line x1="0" y1="-13" x2="0" y2="-45" stroke="white" stroke-width="5.5" stroke-linecap="round"/></g>
      </g>
      <text x="160" y="280" text-anchor="middle" fill="white" font-size="46" font-weight="700">AKS</text>
      <text x="160" y="328" text-anchor="middle" fill="#99f6e4" font-size="26" font-weight="500">Kubernetes</text>
    </g>

  </g>

  <!-- Spectrum label -->
  <text x="80"  y="968" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill-opacity="0.55">&#x2190; Fully Managed</text>
  <text x="1840" y="968" text-anchor="end" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill-opacity="0.55">Full Control &#x2192;</text>
  <rect x="80" y="974" width="1760" height="3" rx="1.5" fill="#dbeafe" fill-opacity="0.25"/>

</svg>
